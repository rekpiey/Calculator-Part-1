<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="container">
        <div id="calculator">
            <div id="result">
                <input disabled type="text" name="num" id="num">
            </div>
            <div id="keyboard">
                <button>DEL</button>
                <button>C</button>
                <button class="ops">/</button>
                <button class="ops">*</button>
                <button>7</button>
                <button>8</button>
                <button>9</button>
                <button class="ops">-</button>
                <button>4</button>
                <button>5</button>
                <button>6</button>
                <button class="ops">+</button>
                <button>1</button>
                <button>2</button>
                <button>3</button>
                <button class="ops">=</button>
                <button>0</button>
                <button>.</button>

               
            </div>
        </div>
    </div>
</body>
</html>
